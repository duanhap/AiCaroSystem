<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI Caro 7×7{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3250;
      --accent: #6c63ff; --accent2: #00d4aa; --text: #e2e8f0; --text-muted: #8892b0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 12px 28px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .nav-links { display: flex; align-items: center; gap: 20px; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.88rem; transition: color .2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-user { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
    .nav-user .username { color: var(--accent2); font-weight: 600; }

    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    .btn { border: none; border-radius: 8px; padding: 10px 20px; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all .2s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #5a52e0; }
    .btn-teal { background: var(--accent2); color: #000; }
    .btn-teal:hover { background: #00b894; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .card-body { padding: 24px; }

    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/game/" class="nav-brand">♟ AI Caro</a>
  <div class="nav-links">
    <a href="/game/pve"><i class="bi bi-robot me-1"></i>Chơi vs Bot</a>
    <a href="/history/"><i class="bi bi-clock-history me-1"></i>Lịch sử</a>
  </div>
  <div class="nav-user">
    <span class="username">{{ user.username if user else '' }}</span>
    <a href="/auth/logout" style="color:var(--text-muted);font-size:.8rem;text-decoration:none">
      <i class="bi bi-box-arrow-right"></i>
    </a>
  </div>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
