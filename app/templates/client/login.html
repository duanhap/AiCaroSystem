<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập – AI Caro</title>
  <style>
    :root { --bg:#0f1117;--surface:#1a1d27;--border:#2e3250;--accent:#6c63ff;--accent2:#00d4aa;--text:#e2e8f0;--muted:#8892b0; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .wrap{width:100%;max-width:400px;padding:24px}
    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{font-size:3rem}
    .logo-title{font-size:1.5rem;font-weight:800;color:var(--accent);margin-top:8px}
    .logo-sub{font-size:.8rem;color:var(--muted);margin-top:4px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px}
    .card-title{font-size:1rem;font-weight:600;margin-bottom:24px}
    .form-group{margin-bottom:16px}
    label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:5px;font-weight:500}
    input{width:100%;background:#22263a;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 14px;font-size:.9rem;outline:none}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.2)}
    input::placeholder{color:var(--muted)}
    .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-size:.95rem;font-weight:600;cursor:pointer;margin-top:8px}
    .btn:hover{background:#5a52e0}
    .error{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);color:#e74c3c;border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:16px}
    .footer{text-align:center;margin-top:20px;font-size:.8rem;color:var(--muted)}
    .footer a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">♟</div>
    <div class="logo-title">AI Caro 7×7</div>
    <div class="logo-sub">Học tăng cường · Q-learning</div>
  </div>
  <div class="card">
    <div class="card-title">Đăng nhập</div>
    {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
    <form method="post" action="/auth/login">
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input type="text" name="username" placeholder="username" autofocus required>
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Đăng nhập</button>
    </form>
  </div>
  <div class="footer">Chưa có tài khoản? <a href="/auth/register">Đăng ký ngay</a></div>
</div>
</body>
</html>
